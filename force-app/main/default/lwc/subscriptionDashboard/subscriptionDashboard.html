<template>
    <lightning-card title="Subscriptions Dashboard" icon-name="standard:entitlement">

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>

        <template if:true={error}>
            <div class="slds-text-color_error slds-p-around_small">
                {error}
            </div>
        </template>        

        <template if:false={isLoading}>

            <template if:true={hasSubscriptions}>
                <div class="slds-p-around_medium">

                    <div class="slds-m-bottom_medium slds-text-heading_medium">
                        Total MRR :
                        <lightning-formatted-number
                            value={displayMRR}
                            format-style="currency">
                        </lightning-formatted-number>
                    </div>

                    <lightning-datatable
                        key-field="Id"
                        data={subscriptions}
                        columns={columns}
                        onrowaction={handleRowClick}>
                    </lightning-datatable>

                </div>
            </template>
            <template if:false={hasSubscriptions}>
                <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                    No subscriptions found for this account.
                </div>
            </template>

        </template>

    </lightning-card>
</template>

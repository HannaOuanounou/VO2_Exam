<template>
    <lightning-card title="Invoices" icon-name="standard:invoice">

        <template if:true={loading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>

        <template if:true={error}>
            <div class="slds-text-color_error slds-p-around_small">
                {error}
            </div>
        </template>

        <template if:true={hasInvoices}>
            <div class="slds-p-around_medium">

                <div class="slds-text-heading_medium slds-m-bottom_medium">
                    Total Paid :
                    <lightning-formatted-number
                        value={totalPaid}
                        format-style="currency">
                    </lightning-formatted-number>
                </div>

                <lightning-datatable
                    key-field="Id"
                    data={invoices}
                    columns={columns}>
                </lightning-datatable>

            </div>
        </template>

        <template if:false={hasInvoices}>
            <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                No invoices for this subscription.
            </div>
        </template>

    </lightning-card>
</template>
